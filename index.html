<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>
        <div class="container">

            <div class="navbar">

                <div class="logo">
                    <img src="images/logo.png" alt="Uber Logo">
                </div>

                <nav>
                    <ul class="nav-links">
                        <li><a href="#">Ride</a></li>
                        <li><a href="#">Drive</a></li>
                        <li><a href="#">Business</a></li>
                        <li><a href="#">About</a></li>
                    </ul>
                </nav>

                <div class="nav-buttons">
                    <button class="login-btn">Log In</button>
                    <button class="signup-btn">Sign Up</button>
                </div>

            </div>

        </div>
    </header>

    <!-- ================= HERO SECTION ================= -->

    <section class="hero">

        <div class="container hero-container">

            <div class="hero-content">

                <h1>Go anywhere with Uber</h1>

                <p>
                    Request a ride in minutes. Choose your destination,
                    compare ride options, and travel safely and comfortably.
                </p>

                <div class="booking-card">

                    <input type="text" placeholder="Enter pickup location">

                    <input type="text" placeholder="Enter destination">

                    <div class="booking-buttons">

                        <button class="ride-btn">
                            See Prices
                        </button>

                        <button class="schedule-btn">
                            Schedule
                        </button>

                    </div>

                </div>

            </div>

            <div class="hero-image">
    <img src="images/hero.jpg" alt="Uber Hero Image">
</div>
        </div>

    </section>

    <!-- ================= MEMBER 3 ================= -->

    <section id="ride-options">

        <!-- Ride Options (Blessey) -->

    </section>

    <section id="safety">

        <!-- Safety Section (Blessey) -->

    </section>

    <section id="why-uber">

        <!-- Why Choose Uber (Blessey) -->

    </section>

    <!-- ================= MEMBER 4 ================= -->

    <footer>

        <!-- Footer (Pavan) -->

    </footer>

</body>

</html>
